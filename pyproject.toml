[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short --cov=scripts/lib/python/storyforge --cov-report=term-missing:skip-covered --cov-fail-under=73"

[tool.coverage.run]
source = ["scripts/lib/python/storyforge"]
omit = [
    "scripts/lib/python/storyforge/__main__.py",
]

[tool.coverage.report]
fail_under = 73
show_missing = true
skip_covered = true
skip_empty = true
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "if TYPE_CHECKING:",
]
