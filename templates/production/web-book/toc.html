<!DOCTYPE html>
<html lang="{{LANG}}" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contents — {{BOOK_TITLE}}</title>
<meta name="author" content="{{AUTHOR}}">
{{CANONICAL}}
<script>{{HEAD_SCRIPT}}</script>
{{TITLE_FONT_LINK}}
<style>
{{CSS}}
</style>
</head>
<body>

<nav class="book-nav">
  <a href="index.html" class="nav-title">{{BOOK_TITLE}}</a>
  <div class="nav-controls">
    <button class="theme-toggle" aria-label="Change theme">
      <span class="icon-light">&#9788;</span>
      <span class="icon-dark">&#9790;</span>
      <span class="icon-sepia">&#9782;</span>
    </button>
  </div>
</nav>

<main class="reading-column" style="padding-top: 4em;">
  <h1 class="contents-title">Contents</h1>

  <div class="toc-contents">
{{TOC_ENTRIES}}
  </div>

  {{BACK_MATTER_LINKS}}

  <div id="sf-toc-export" style="display:none; text-align:center; margin-top:3em;">
    <p id="sf-toc-label" style="font-family:var(--title-font); font-size:0.78em; font-style:italic; color:var(--text-dim); letter-spacing:0.04em; margin-bottom:1.2em;"></p>
    <div style="display:flex; gap:0.75em; justify-content:center; flex-wrap:wrap;">
      <a class="sf-toc-dl" data-format="json" href="#" style="font-family:var(--title-font); font-size:0.88em; color:var(--accent); letter-spacing:0.04em; cursor:pointer; border-bottom:1px solid var(--border); padding-bottom:0.15em; transition:color 0.3s, border-color 0.3s; text-decoration:none;">Download JSON</a>
      <span style="color:var(--text-dim); font-size:0.78em; line-height:1.8;">&middot;</span>
      <a class="sf-toc-dl" data-format="md" href="#" style="font-family:var(--title-font); font-size:0.88em; color:var(--accent); letter-spacing:0.04em; cursor:pointer; border-bottom:1px solid var(--border); padding-bottom:0.15em; transition:color 0.3s, border-color 0.3s; text-decoration:none;">Download Markdown</a>
    </div>
  </div>
</main>

<nav class="chapter-nav" style="justify-content: center;">
  <a href="index.html" class="nav-link">&larr; Back to cover</a>
</nav>

<script>
{{JS}}
</script>
<script>
(function(){
  var bookSlug = '{{BOOK_SLUG}}';
  var prefix = 'storyforge-annotations-' + bookSlug + '-';

  function getAllAnnotations() {
    var all = [];
    for (var i = 0; i < localStorage.length; i++) {
      var key = localStorage.key(i);
      if (key && key.indexOf(prefix) === 0) {
        try {
          var parsed = JSON.parse(localStorage.getItem(key));
          var chSlug = key.slice(prefix.length);
          parsed.forEach(function(a) { if (!a.chapter) a.chapter = chSlug; });
          all = all.concat(parsed);
        } catch(e) {}
      }
    }
    all.sort(function(a,b) {
      if (a.chapter < b.chapter) return -1;
      if (a.chapter > b.chapter) return 1;
      return (a.anchor.paragraphIndex||0) - (b.anchor.paragraphIndex||0);
    });
    return all;
  }

  var annotations = getAllAnnotations();
  if (annotations.length > 0) {
    var panel = document.getElementById('sf-toc-export');
    var label = document.getElementById('sf-toc-label');
    panel.style.display = '';
    var n = annotations.length;
    label.textContent = n + (n === 1 ? ' annotation' : ' annotations') + ' across all chapters';

    function download(content, filename, mime) {
      var blob = new Blob([content], {type: mime});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = filename; a.style.display = 'none';
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    var buttons = document.querySelectorAll('.sf-toc-dl');
    buttons.forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        var fmt = btn.dataset.format;
        var titleEl = document.querySelector('.nav-title');
        var bookTitle = titleEl ? titleEl.textContent.trim() : bookSlug;
        if (fmt === 'json') {
          download(JSON.stringify({book:bookTitle,exportedAt:new Date().toISOString(),annotator:'author',annotations:annotations},null,2),
            bookSlug+'-annotations.json','application/json');
        } else {
          var lines = ['# Annotations: '+bookTitle,'Exported: '+new Date().toISOString().slice(0,10),''];
          var curCh = null;
          annotations.forEach(function(a) {
            if (a.chapter !== curCh) { curCh = a.chapter; var n=(curCh.match(/chapter-(\d+)/)||[])[1]||curCh; lines.push('## Chapter '+n,''); }
            if (a.type==='margin-note') lines.push('*(margin note)*');
            if (a.selectedText) lines.push('> \u201c'+a.selectedText+'\u201d');
            if (a.comment) lines.push(a.comment);
            lines.push('');
          });
          download(lines.join('\n'), bookSlug+'-annotations.md','text/markdown');
        }
      });
    });
  }
})();
</script>
</body>
</html>
