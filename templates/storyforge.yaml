# ============================================================================
# storyforge.yaml — Project Configuration
# ============================================================================
# This file is the central manifest for your Storyforge novel project.
# Generated by storyforge-init. Edit values as needed; do not remove keys.
#
# Full schema documentation: references/storyforge-yaml-schema.md
# ============================================================================

# ----------------------------------------------------------------------------
# Project Metadata
# ----------------------------------------------------------------------------
# Core identity of the novel. These values inform every downstream skill —
# genre shapes evaluation heuristics, target_words calibrates pacing feedback,
# and the logline anchors continuity checks.
project:
  title: "PROJECT_TITLE"                # Working title of the novel
  genre: "PROJECT_GENRE"                # Primary genre (e.g., "fantasy", "thriller", "literary fiction")
  subgenre:                             # Optional: narrower classification (e.g., "urban fantasy", "techno-thriller")
  target_words: 80000                   # Target manuscript word count
  logline: "PROJECT_LOGLINE"            # 1-2 sentence pitch: protagonist + conflict + stakes
  # Coaching level — controls how proactive Claude is with creative decisions:
  #   full   — Claude proposes, drafts, and revises. Maximum creative partnership.
  #   coach  — Claude analyzes and guides but never writes prose. You write everything.
  #   strict — Claude only asks questions and produces checklists. Purely Socratic.
  # Override per-session: --coaching coach or STORYFORGE_COACHING=coach
  coaching_level: full
  series_name:                          # Optional: series title (e.g., "The Mapmaker Trilogy")
  series_position:                      # Optional: position in the series (e.g., 1, 2, 3)

# ----------------------------------------------------------------------------
# Artifacts
# ----------------------------------------------------------------------------
# Tracks which reference documents have been created. Skills check these flags
# before running to ensure their upstream dependencies exist.
#
# Each entry has three fields:
#   exists  — has the file been created? (true/false)
#   path    — relative path from project root
#   updated — date last modified (YYYY-MM-DD) or null
artifacts:
  world_bible:
    exists: false
    path: reference/world-bible.md
    updated:

  character_bible:
    exists: false
    path: reference/character-bible.md
    updated:

  systems_bible:
    exists: false
    path: reference/systems-bible.md
    updated:

  story_architecture:
    exists: false
    path: reference/story-architecture.md
    updated:

  voice_guide:
    exists: false
    path: reference/voice-guide.md
    updated:

  timeline:
    exists: false
    path: reference/timeline.md
    updated:

  scene_index:
    exists: false
    path: scenes/scene-index.yaml
    updated:
    # Example scene-index.yaml entries (use descriptive slugs for IDs):
    #   scenes:
    #     - id: "geometry-of-dying"
    #       title: "The Geometry of Dying"
    #       pov: character-name
    #       location: location-name
    #       timeline_position: 1
    #       status: outline
    #       summary: >
    #         Brief description of what happens in this scene.
    #     - id: "sheriffs-ledger"
    #       title: "The Sheriff's Ledger"
    #       pov: character-name
    #       location: location-name
    #       timeline_position: 2
    #       status: outline
    #       summary: >
    #         Brief description of what happens in this scene.

  continuity_tracker:
    exists: false
    path: reference/continuity-tracker.md
    updated:

  key_decisions:
    exists: false
    path: reference/key-decisions.md
    updated:

  chapter_map:
    exists: false
    path: reference/chapter-map.yaml
    updated:

  manuscript:
    exists: false
    path: manuscript/
    updated:

# ----------------------------------------------------------------------------
# Scene Extensions
# ----------------------------------------------------------------------------
# Custom per-scene fields appended to every entry in the scene index.
# Add project-specific metadata here (e.g., tension level, subplot tags).
#
# Each extension needs:
#   name        — valid YAML key (lowercase, underscores, no spaces)
#   type        — string | number | bool | enum
#   description — what it tracks; for enum types, list allowed values
#
# Remove the examples below or replace them with your own.
scene_extensions: []
  # - name: tension_level
  #   type: enum
  #   description: "Narrative tension 1-5: 1=reflective, 3=rising, 5=climactic"
  # - name: subplot_tag
  #   type: string
  #   description: "Primary subplot thread this scene advances"

# ----------------------------------------------------------------------------
# Evaluation
# ----------------------------------------------------------------------------
# Custom evaluator personas that supplement the built-in evaluators.
# Each entry points to a persona file with the evaluator's system prompt
# and scoring rubric.
#
# Uncomment and duplicate the example below to add your own.
evaluation:
  custom_evaluators: []
    # - name: pacing_critic
    #   persona_file: evaluation/pacing-critic.md
    #   description: "Analyzes pacing against genre expectations"

# ----------------------------------------------------------------------------
# Phase
# ----------------------------------------------------------------------------
# Current workflow phase. Controls which skills are available and which
# guardrails are active. Advances as the project progresses.
#
# Valid values:
#   development   — world-building, characters, systems design
#   scene-design  — designing scenes, building the scene index
#   drafting      — writing prose against the scene index
#   evaluation    — reviewing drafts with evaluators
#   revision      — revising based on evaluation feedback
#   review        — assessing revision results, deciding next cycle
#   complete      — manuscript finished, artifacts locked
#   production    — assembling scenes into chapters, generating epub/PDF
phase: development
